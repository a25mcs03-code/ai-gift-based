<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Recommendations - AI Gift System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-4xl mx-auto px-4 py-12">
    <div class="text-center mb-10">
      <span class="text-sm font-bold text-rose-500 tracking-wider uppercase">AI Generation Wizard</span>
      <h1 class="text-3xl font-extrabold text-slate-800 mt-1">Describe the Recipient</h1>
    </div>

    <!-- Questionnaire Card -->
    <div class="bg-white p-8 rounded-3xl shadow-md border border-gray-100 mb-8">
      <form id="recommendation-form" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Who is this for?</label>
            <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500">
              <option>Friend</option>
              <option>Family Member</option>
              <option>Partner / Spouse</option>
              <option>Colleague</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">What is the Occasion?</label>
            <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500">
              <option>Birthday</option>
              <option>Anniversary</option>
              <option>Festival / Holiday</option>
              <option>Graduation</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Interests, Hobbies & Personal Passions</label>
          <textarea rows="3" placeholder="Examples: Loves rock climbing, specialty light roast coffee, mechanical keyboards, minimalist aesthetics..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500"></textarea>
        </div>

        <button type="submit" class="w-full bg-rose-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-rose-200 hover:bg-rose-600 transition flex justify-center items-center space-x-2">
          <span>✨ Generate Gift Recommendations</span>
        </button>
      </form>
    </div>

    <!-- Dynamic Output Area Placeholder -->
    <div id="results-container" class="hidden space-y-6">
      <h2 class="text-xl font-bold text-slate-800 mb-4">✨ AI Suggested Match Options</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="results-grid">
        <!-- Script will populate cards here -->
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
