<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - AI Gift Recommendation System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 max-w-md w-full">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-slate-800">Create Account</h1>
      <p class="text-sm text-gray-500 mt-1">Get personalized gift lists anytime</p>
    </div>

    <form class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
        <input type="text" required placeholder="John Doe" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
        <input type="email" required placeholder="name@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
        <input type="password" required placeholder="Minimum 8 characters" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500">
      </div>
      <button type="submit" class="w-full bg-rose-500 text-white font-semibold py-3 rounded-xl hover:bg-rose-600 transition shadow-md shadow-rose-100">Sign Up</button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-500">
      Already have an account? <a href="login.html" class="text-rose-500 font-semibold hover:underline">Log in</a>
    </div>
  </div>

</body>
</html>
