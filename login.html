<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI Gift Recommendation System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 max-w-md w-full">
    <!-- Logo Header -->
    <div class="text-center mb-8">
      <div class="inline-flex bg-rose-500 text-white p-3 rounded-2xl mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V6a2 2 0 10-2 2h2zm0 0H4v13a2 2 0 002 2h12a2 2 0 002-2V8H12z" /></svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Welcome Back</h1>
      <p class="text-sm text-gray-500 mt-1">Log in to view your favorite curated gifts</p>
    </div>

    <!-- Form -->
    <form class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
        <input type="email" required placeholder="name@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
        <input type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500">
      </div>
      <button type="submit" class="w-full bg-rose-500 text-white font-semibold py-3 rounded-xl hover:bg-rose-600 transition shadow-md shadow-rose-100">Sign In</button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-500">
      Don't have an account? <a href="register.html" class="text-rose-500 font-semibold hover:underline">Register here</a>
    </div>
  </div>

</body>
</html>
